<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SBTI 测试中心 - 发现真实的自己</title>
  <link rel="icon" type="image/svg+xml" href="./favicon/favicon.svg">
  <link rel="icon" type="image/png" sizes="96x96" href="./favicon/favicon-96x96.png">
  <link rel="icon" type="image/x-icon" href="./favicon/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="./favicon/apple-touch-icon.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #6c8d71;
      --primary-dark: #4d6a53;
      --bg-gradient-start: #f0f7f0;
      --bg-gradient-end: #e8f2ea;
      --card-bg: #ffffff;
      --text-primary: #1e2a22;
      --text-secondary: #6a786f;
      --shadow: 0 20px 60px rgba(108, 141, 113, 0.15);
      --shadow-hover: 0 30px 80px rgba(108, 141, 113, 0.25);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
      min-height: 100vh;
      overflow-x: hidden;
      color: var(--text-primary);
    }

    /* 粒子背景 */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: var(--primary);
      border-radius: 50%;
      opacity: 0.3;
      animation: float-up linear infinite;
    }

    @keyframes float-up {
      0% {
        transform: translateY(100vh) scale(0);
        opacity: 0;
      }
      10% {
        opacity: 0.3;
      }
      90% {
        opacity: 0.3;
      }
      100% {
        transform: translateY(-100px) scale(1);
        opacity: 0;
      }
    }

    /* 主容器 */
    .container {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 60px 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* 标题动画 */
    .hero-section {
      text-align: center;
      margin-bottom: 80px;
      animation: fadeInDown 1s ease-out;
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-50px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .main-title {
      font-size: clamp(48px, 8vw, 80px);
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 20px;
      animation: titleGlow 2s ease-in-out infinite alternate;
    }

    @keyframes titleGlow {
      from {
        filter: drop-shadow(0 0 20px rgba(108, 141, 113, 0.3));
      }
      to {
        filter: drop-shadow(0 0 40px rgba(108, 141, 113, 0.5));
      }
    }

    .subtitle {
      font-size: clamp(16px, 2.5vw, 20px);
      color: var(--text-secondary);
      line-height: 1.8;
      max-width: 600px;
      margin: 0 auto;
      animation: fadeIn 1s ease-out 0.3s both;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    /* 卡片网格 */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 30px;
      width: 100%;
      max-width: 900px;
      animation: fadeInUp 1s ease-out 0.5s both;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(50px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* 测试卡片 */
    .test-card {
      background: var(--card-bg);
      border-radius: 24px;
      padding: 40px 30px;
      box-shadow: var(--shadow);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .test-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(108, 141, 113, 0.05) 0%, rgba(108, 141, 113, 0.02) 100%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .test-card:hover {
      transform: translateY(-10px) scale(1.02);
      box-shadow: var(--shadow-hover);
    }

    .test-card:hover::before {
      opacity: 1;
    }

    .card-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      font-size: 40px;
      color: white;
      box-shadow: 0 10px 30px rgba(108, 141, 113, 0.3);
      transition: transform 0.3s ease;
    }

    .test-card:hover .card-icon {
      transform: rotate(-5deg) scale(1.1);
    }

    .card-badge {
      display: inline-block;
      background: rgba(108, 141, 113, 0.1);
      color: var(--primary-dark);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 16px;
      letter-spacing: 0.5px;
    }

    .card-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--text-primary);
    }

    .card-description {
      color: var(--text-secondary);
      line-height: 1.7;
      font-size: 15px;
      margin-bottom: 24px;
    }

    .card-meta {
      display: flex;
      gap: 20px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .card-meta-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .card-arrow {
      position: absolute;
      right: 30px;
      bottom: 30px;
      width: 40px;
      height: 40px;
      background: var(--primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 20px;
      transition: all 0.3s ease;
      opacity: 0;
      transform: translateX(-10px);
    }

    .test-card:hover .card-arrow {
      opacity: 1;
      transform: translateX(0);
    }

    /* 页脚 */
    .footer {
      margin-top: 80px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 14px;
      animation: fadeIn 1s ease-out 0.8s both;
    }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .footer-link {
      color: var(--primary);
      text-decoration: none;
      font-size: 13px;
      transition: all 0.3s ease;
      padding: 6px 12px;
      border-radius: 8px;
    }

    .footer-link:hover {
      color: var(--primary-dark);
      background: rgba(108, 141, 113, 0.1);
    }

    .footer-divider {
      color: var(--text-secondary);
      opacity: 0.5;
    }

    .footer a {
      color: var(--primary);
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .footer a:hover {
      color: var(--primary-dark);
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .container {
        padding: 40px 16px;
      }

      .hero-section {
        margin-bottom: 50px;
      }

      .cards-grid {
        grid-template-columns: 1fr;
        gap: 20px;
      }

      .test-card {
        padding: 30px 24px;
      }

      .card-arrow {
        opacity: 1;
        transform: translateX(0);
      }
    }

    /* 加载动画 */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }

    .loading-overlay.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .loader {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(108, 141, 113, 0.2);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <!-- 加载动画 -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loader"></div>
  </div>

  <!-- 粒子背景 -->
  <div class="particles" id="particles"></div>

  <!-- 主容器 -->
  <div class="container">
    <!-- 标题区域 -->
    <div class="hero-section">
      <h1 class="main-title">SBTI 测试中心</h1>
      <p class="subtitle">探索人格的无限可能，发现最真实的自己<br>选择适合你的测试类型，开启自我认知之旅</p>
    </div>

    <!-- 卡片网格 -->
    <div class="cards-grid">
      <!-- 经典 SBTI 卡片 -->
      <a href="classic-sbti.html" class="test-card">
        <div class="card-icon">&#9733;</div>
        <span class="card-badge">推荐</span>
        <h2 class="card-title">经典 SBTI</h2>
        <p class="card-description">
          原版 SBTI 人格测试，通过精心设计的多维度题目，深度解析你的人格特质。经过验证的经典版本，提供最准确的人格分析。
        </p>
        <div class="card-meta">
          <div class="card-meta-item">
            <span>&#9201;</span>
            <span>约 10-15 分钟</span>
          </div>
          <div class="card-meta-item">
            <span>&#10003;</span>
            <span>31 道题目</span>
          </div>
        </div>
        <div class="card-arrow">&rarr;</div>
      </a>

      <!-- 更多测试即将推出 -->
      <div class="test-card" style="opacity: 0.6; cursor: not-allowed;">
        <div class="card-icon" style="background: linear-gradient(135deg, #9ca3af 0%, #6b7280 100%); box-shadow: 0 10px 30px rgba(156, 163, 175, 0.3);">+</div>
        <span class="card-badge" style="background: rgba(156, 163, 175, 0.1); color: #6b7280;">即将推出</span>
        <h2 class="card-title" style="color: #6b7280;">更多测试</h2>
        <p class="card-description" style="color: #9ca3af;">
          我们正在开发更多有趣的 SBTI 变体测试，为你带来更丰富的人格探索体验。敬请期待！
        </p>
        <div class="card-meta">
          <div class="card-meta-item">
            <span>&#128197;</span>
            <span>敬请期待</span>
          </div>
        </div>
      </div>
    </div>

    <!-- 页脚 -->
    <div class="footer">
      <div class="footer-links">
        <a href="./legal/privacy.html" class="footer-link">隐私政策</a>
        <span class="footer-divider">|</span>
        <a href="./legal/terms.html" class="footer-link">使用条款</a>
        <span class="footer-divider">|</span>
        <a href="./legal/copyright.html" class="footer-link">版权声明</a>
      </div>
      <p>&copy; 2026 SBTI 测试中心 | 仅供娱乐，请勿作为专业诊断依据</p>
    </div>
  </div>

  <script>
    // 页面加载完成后隐藏加载动画
    window.addEventListener('load', function() {
      setTimeout(function() {
        document.getElementById('loadingOverlay').classList.add('hidden');
      }, 500);
    });

    // 创建粒子背景
    function createParticles() {
      const particlesContainer = document.getElementById('particles');
      const particleCount = 30;

      for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
        particle.style.animationDelay = Math.random() * 10 + 's';
        particle.style.width = particle.style.height = (Math.random() * 6 + 3) + 'px';
        particlesContainer.appendChild(particle);
      }
    }

    createParticles();

    // 为不可点击的卡片添加提示
    document.querySelectorAll('.test-card[style*="cursor: not-allowed"]').forEach(function(card) {
      card.addEventListener('click', function(e) {
        e.preventDefault();
        alert('该测试即将推出，敬请期待！');
      });
    });
  </script>
</body>
</html>
